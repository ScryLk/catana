  /api/auth/token/:
    post:
      operationId: createTokenObtainPair
      summary: Login - Obter tokens JWT
      description: 'Autentica um usuário e retorna um par de tokens JWT (access e refresh). Use o access token no header Authorization: Bearer {token} para acessar endpoints protegidos.'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
            example:
              username: "admin"
              password: "senha123"
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: Token de acesso JWT
                  refresh:
                    type: string
                    description: Token de refresh JWT
              example:
                access: "eyJ0eXAiOiJKV1QiLCJhbGc..."
                refresh: "eyJ0eXAiOiJKV1QiLCJhbGc..."
          description: 'Login realizado com sucesso'
        '401':
          description: 'Credenciais inválidas'
      security: []
      tags:
      - auth
  /api/auth/token/refresh/:
    post:
      operationId: createTokenRefresh
      summary: Renovar token de acesso
      description: 'Usa um refresh token válido para obter um novo access token JWT sem precisar fazer login novamente.'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
            example:
              refresh: "eyJ0eXAiOiJKV1QiLCJhbGc..."
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: Novo token de acesso JWT
              example:
                access: "eyJ0eXAiOiJKV1QiLCJhbGc..."
          description: 'Token renovado com sucesso'
        '401':
          description: 'Refresh token inválido ou expirado'
      security: []
      tags:
      - auth
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Autenticacao JWT. Use o endpoint /api/auth/token/ para obter o token'
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+\z
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        avatar:
          type: string
          format: binary
          nullable: true
        role:
          enum:
          - admin
          - editor
          - viewer
          type: string
      required:
      - username
      - role
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        price:
          type: string
          format: decimal
          multipleOf: 0.01
          maximum: 100000000
          minimum: -100000000
        sku:
          type: string
          maxLength: 100
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        image:
          type: integer
          nullable: true
        created_by:
          type: integer
      required:
      - name
      - description
      - price
      - sku
      - created_by
    Media:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        file:
          type: string
          format: binary
        created_at:
          type: string
          format: date-time
          readOnly: true
        uploaded_by:
          type: integer
      required:
      - file
      - uploaded_by
    Theme:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        styles:
          type: object
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: integer
      required:
      - name
      - styles
      - created_by
    Catalog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        theme:
          type: integer
          nullable: true
        created_by:
          type: integer
      required:
      - title
      - description
      - created_by
    Page:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        created_at:
          type: string
          format: date-time
          readOnly: true
        catalog:
          type: integer
        background_image:
          type: integer
          nullable: true
      required:
      - order
      - catalog
    Component:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        component_type:
          enum:
          - text
          - image
          - product
          type: string
        content:
          type: object
        is_reusable:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: integer
      required:
      - name
      - component_type
      - content
      - created_by
    PageComponent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        position_x:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        position_y:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        width:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        height:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        layer:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        page:
          type: integer
        component:
          type: integer
      required:
      - position_x
      - position_y
      - width
      - height
      - layer
      - page
      - component
    Comment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        position_x:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        position_y:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
        catalog:
          type: integer
        user:
          type: integer
      required:
      - text
      - catalog
      - user
    Activity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        action:
          type: string
          maxLength: 255
        timestamp:
          type: string
          format: date-time
          readOnly: true
        details:
          type: object
          nullable: true
        user:
          type: integer
      required:
      - action
      - user
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - username
      - password
    TokenRefresh:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - refresh
